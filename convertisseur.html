<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan and Friends - Convertisseur de Devises</title>
    
    <style>
        /* ================= BASE ================= */
        :root {
            --bg-noir: #121212; --bg-gris-fonce: #1e1e1e;
            --texte-clair: #f5f5f5; --couleur-sakura: #ffb7c5;
            --texte-fonce: #121212; --kanpai-rouge: #c62828;
            --bordure-kanpai: #444;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: var(--bg-noir); color: var(--texte-clair); overflow-x: hidden; }
        
        /* ================= HEADER & LOGO ================= */
        header { background-color: var(--bg-gris-fonce); padding: 20px; text-align: center; border-bottom: 2px solid var(--couleur-sakura); position: relative;}
        header h1 { margin: 0; font-size: 32px; color: var(--couleur-sakura); }
        .logo-static { position: absolute; top: 20px; left: 20px; height: 70px; width: 70px; object-fit: cover; border-radius: 50%; cursor: default; }

        /* ================= NAV & BURGER ================= */
        .nav-container { background-color: #000; position: relative; z-index: 1000;}
        .menu-burger { display: none; background: transparent; color: var(--couleur-sakura); border: none; padding: 15px; font-size: 18px; cursor: pointer; width: 100%; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        .menu-burger:hover { background: #111; }
        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 15px; }
        nav a { color: var(--texte-clair); text-decoration: none; padding: 8px 12px; border-radius: 20px; transition: 0.3s; font-size: 14px; }
        nav a:hover, nav a.actif { background-color: var(--couleur-sakura); color: var(--texte-fonce); font-weight: bold; }

        /* ================= CONVERTISSEUR ================= */
        .converter-wrapper { display: flex; justify-content: center; align-items: center; padding: 50px 20px; min-height: 60vh;}
        .converter-card { background: var(--bg-gris-fonce); border-radius: 12px; padding: 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); border: 2px solid #333; width: 100%; max-width: 500px; text-align: center; position: relative;}
        .converter-card h2 { color: var(--couleur-sakura); margin-top: 0; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: bold; color: #ccc; font-size: 14px; }
        .input-row { display: flex; gap: 10px; align-items: stretch;}
        
        .input-row input[type="number"] { flex: 2; padding: 15px; border-radius: 8px; border: 1px solid var(--bordure-kanpai); background: var(--bg-noir); color: white; font-size: 20px; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box;}
        .input-row input[type="number"]:focus { border-color: var(--couleur-sakura); box-shadow: 0 0 10px rgba(255,183,197,0.3); }
        
        .swap-btn-container { margin: -10px 0 10px 0; }
        .btn-swap { background: var(--kanpai-rouge); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: inline-flex; justify-content: center; align-items: center;}
        .btn-swap:hover { background: var(--couleur-sakura); color: black; transform: rotate(180deg); }

        .rate-info { margin-top: 25px; font-size: 13px; color: #888; border-top: 1px solid #333; padding-top: 15px;}
        .loader { display: none; color: var(--couleur-sakura); font-weight: bold; margin-bottom: 15px; }

        /* ================= CUSTOM SELECT (AVEC RECHERCHE) ================= */
        .custom-select-wrapper { flex: 1; position: relative; user-select: none; }
        
        .select-trigger { background: #222; border: 1px solid var(--bordure-kanpai); border-radius: 8px; padding: 15px; color: var(--couleur-sakura); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; height: 100%; box-sizing: border-box;}
        .select-trigger:after { content: "▼"; font-size: 12px; margin-left: 10px;}
        
        .select-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #2a2a2a; border: 1px solid var(--couleur-sakura); border-radius: 8px; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; display: none; flex-direction: column; overflow: hidden;}
        .select-dropdown.open { display: flex; }
        
        .search-box { padding: 10px; border-bottom: 1px solid #444; background: #1a1a1a; }
        .search-box input { width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #111; color: white; box-sizing: border-box; font-size: 14px; outline: none;}
        .search-box input:focus { border-color: var(--couleur-sakura); }

        .options-list { max-height: 200px; overflow-y: auto; }
        .options-list::-webkit-scrollbar { width: 6px; }
        .options-list::-webkit-scrollbar-track { background: #222; }
        .options-list::-webkit-scrollbar-thumb { background: var(--couleur-sakura); border-radius: 10px; }
        
        .option-item { padding: 12px 15px; color: white; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .option-item:hover { background: var(--couleur-sakura); color: black; font-weight: bold; }
        .option-item.selected { background: var(--kanpai-rouge); color: white; font-weight: bold;}

        /* ================= RESPONSIVE ================= */
        @media (max-width: 900px) {
            .logo-static { height: 50px; width: 50px; top: 10px; left: 10px; display: block; margin: 0 auto 10px auto; }
            header { padding: 10px; }
            .menu-burger { display: block; }
            nav { display: none; flex-direction: column; padding: 0; width: 100%; }
            nav.show-nav { display: flex; }
            nav a { border-radius: 0; border-bottom: 1px solid #222; padding: 15px; width: 100%; box-sizing: border-box; text-align: center; font-size: 16px;}
            .input-row { flex-direction: column; }
            .select-trigger { justify-content: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="japan and friends.png" alt="Logo" class="logo-static">
        <h1>Japan and Friends</h1>
        <p>Le Grand Guide Culturel du Japon</p>
    </header>

    <div class="nav-container">
        <button class="menu-burger" onclick="toggleNav()">☰ Menu Principal</button>
        <nav id="main-nav">
            <a href="index.html">Carte & Activités</a>
            <a href="vocabulaire.html">Mots Utiles</a>
            <a href="convertisseur.html" class="actif">Convertisseur Yen/Euro</a>
            <a href="infos.html">Bons Plans & Transports</a>
            <a href="budget.html">Mon Solde</a>
            <a href="roadtrip.html">Itinéraire 90 Jours</a>
            <a href="guide.html">Guide Culturel</a>
        </nav>
    </div>

    <main class="converter-wrapper">
        <div class="converter-card">
            <h2>💴 Convertisseur</h2>
            
            <div id="loader" class="loader">⏳ Récupération des taux en direct...</div>

            <div class="input-group">
                <label>Montant à convertir</label>
                <div class="input-row">
                    <input type="number" id="amountOne" value="1000" min="0">
                    
                    <!-- MENU DÉROULANT CUSTOM 1 -->
                    <div class="custom-select-wrapper" id="wrapperOne">
                        <div class="select-trigger" id="triggerOne" onclick="toggleDropdown('dropdownOne')">🇯🇵 JPY (Yen)</div>
                        <div class="select-dropdown" id="dropdownOne">
                            <div class="search-box">
                                <input type="text" placeholder="Rechercher..." id="searchOne" onkeyup="filterOptions('dropdownOne', 'searchOne')" onclick="event.stopPropagation();">
                            </div>
                            <div class="options-list" id="listOne">
                                <!-- Rempli par JavaScript -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="swap-btn-container">
                <button class="btn-swap" onclick="swapCurrencies()" title="Inverser les devises">⇅</button>
            </div>

            <div class="input-group">
                <label>Résultat de la conversion</label>
                <div class="input-row">
                    <input type="number" id="amountTwo" readonly>
                    
                    <!-- MENU DÉROULANT CUSTOM 2 -->
                    <div class="custom-select-wrapper" id="wrapperTwo">
                        <div class="select-trigger" id="triggerTwo" onclick="toggleDropdown('dropdownTwo')">🇪🇺 EUR (Euro)</div>
                        <div class="select-dropdown" id="dropdownTwo">
                            <div class="search-box">
                                <input type="text" placeholder="Rechercher..." id="searchTwo" onkeyup="filterOptions('dropdownTwo', 'searchTwo')" onclick="event.stopPropagation();">
                            </div>
                            <div class="options-list" id="listTwo">
                                <!-- Rempli par JavaScript -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="rate-info" id="rateInfo">Taux de change mis à jour aujourd'hui.</div>
        </div>
    </main>

    <script>
        function toggleNav() { document.getElementById('main-nav').classList.toggle('show-nav'); }

        // ================= DONNÉES DES DEVISES =================
        const currencies = [
            { code: "JPY", flag: "🇯🇵", name: "JPY (Yen)" },
            { code: "EUR", flag: "🇪🇺", name: "EUR (Euro)" },
            { code: "USD", flag: "🇺🇸", name: "USD (Dollar)" },
            { code: "GBP", flag: "🇬🇧", name: "GBP (Livre)" },
            { code: "CAD", flag: "🇨🇦", name: "CAD (Dollar CA)" },
            { code: "CHF", flag: "🇨🇭", name: "CHF (Franc CH)" },
            { code: "AUD", flag: "🇦🇺", name: "AUD (Dollar AU)" },
            { code: "KRW", flag: "🇰🇷", name: "KRW (Won)" },
            { code: "CNY", flag: "🇨🇳", name: "CNY (Yuan)" },
            { code: "THB", flag: "🇹🇭", name: "THB (Baht)" },
            { code: "VND", flag: "🇹🇭", name: "VND (Dong)" }, // Drapeau indicatif
            { code: "SGD", flag: "🇸🇬", name: "SGD (Dollar SG)" },
            { code: "HKD", flag: "🇸🇬", name: "HKD (Dollar HK)" } // Drapeau indicatif
        ];

        // État actuel
        let currentCurOne = "JPY";
        let currentCurTwo = "EUR";
        let exchangeRates = {};

        // ================= GESTION DES MENUS DÉROULANTS CUSTOM =================
        function initDropdowns() {
            populateList('listOne', 'triggerOne', 'dropdownOne', true);
            populateList('listTwo', 'triggerTwo', 'dropdownTwo', false);
        }

        function populateList(listId, triggerId, dropdownId, isFirst) {
            const listEl = document.getElementById(listId);
            listEl.innerHTML = "";
            
            let selectedCode = isFirst ? currentCurOne : currentCurTwo;

            currencies.forEach(cur => {
                let isSelected = cur.code === selectedCode;
                let div = document.createElement("div");
                div.className = "option-item" + (isSelected ? " selected" : "");
                div.innerHTML = `${cur.flag} ${cur.name}`;
                
                div.onclick = function(e) {
                    e.stopPropagation(); // Évite de rouvrir le menu direct
                    // Mettre à jour la variable globale
                    if(isFirst) currentCurOne = cur.code;
                    else currentCurTwo = cur.code;
                    
                    // Mettre à jour l'affichage du bouton
                    document.getElementById(triggerId).innerHTML = `${cur.flag} ${cur.name}`;
                    
                    // Rafraîchir les deux listes pour remettre le style "selected" au bon endroit
                    initDropdowns(); 
                    
                    // Fermer le menu
                    document.getElementById(dropdownId).classList.remove('open');
                    
                    // Relancer le calcul !
                    calculate();
                };
                listEl.appendChild(div);
            });
        }

        function toggleDropdown(dropdownId) {
            // Fermer l'autre dropdown si on clique sur un
            if(dropdownId === 'dropdownOne') document.getElementById('dropdownTwo').classList.remove('open');
            else document.getElementById('dropdownOne').classList.remove('open');

            const dp = document.getElementById(dropdownId);
            dp.classList.toggle('open');
            
            // Focus la barre de recherche automatiquement
            if(dp.classList.contains('open')){
                let searchInput = dp.querySelector('.search-box input');
                searchInput.value = ""; // Vider l'ancienne recherche
                searchInput.focus();
                filterOptions(dropdownId, searchInput.id); // Remettre toutes les options
            }
        }

        function filterOptions(dropdownId, searchId) {
            let input = document.getElementById(searchId).value.toUpperCase();
            let options = document.getElementById(dropdownId).querySelectorAll('.option-item');
            
            options.forEach(opt => {
                let text = opt.innerText || opt.textContent;
                if (text.toUpperCase().indexOf(input) > -1) {
                    opt.style.display = "";
                } else {
                    opt.style.display = "none";
                }
            });
        }

        // Fermer les dropdowns si on clique ailleurs sur la page
        document.addEventListener('click', function(e) {
            if (!document.getElementById('wrapperOne').contains(e.target)) {
                document.getElementById('dropdownOne').classList.remove('open');
            }
            if (!document.getElementById('wrapperTwo').contains(e.target)) {
                document.getElementById('dropdownTwo').classList.remove('open');
            }
        });


        // ================= LOGIQUE DU CALCULATEUR =================
        const amountEl_one = document.getElementById('amountOne');
        const amountEl_two = document.getElementById('amountTwo');
        const rateInfo = document.getElementById('rateInfo');
        const loader = document.getElementById('loader');

        async function fetchRates() {
            loader.style.display = 'block';
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
                const data = await res.json();
                exchangeRates = data.rates;
                calculate();
            } catch (error) {
                rateInfo.innerText = "❌ Erreur de connexion : Impossible de récupérer les taux en direct.";
            } finally {
                loader.style.display = 'none';
            }
        }

        function calculate() {
            if (Object.keys(exchangeRates).length === 0) return;

            const rateOne = exchangeRates[currentCurOne];
            const rateTwo = exchangeRates[currentCurTwo];
            const finalRate = rateTwo / rateOne;

            amountEl_two.value = (amountEl_one.value * finalRate).toFixed(2);
            rateInfo.innerText = `1 ${currentCurOne} = ${finalRate.toFixed(4)} ${currentCurTwo} (Taux du jour)`;
        }

        function swapCurrencies() {
            let tempCode = currentCurOne;
            currentCurOne = currentCurTwo;
            currentCurTwo = tempCode;
            
            // Mise à jour visuelle des boutons
            let cur1Obj = currencies.find(c => c.code === currentCurOne);
            let cur2Obj = currencies.find(c => c.code === currentCurTwo);
            
            document.getElementById('triggerOne').innerHTML = `${cur1Obj.flag} ${cur1Obj.name}`;
            document.getElementById('triggerTwo').innerHTML = `${cur2Obj.flag} ${cur2Obj.name}`;
            
            initDropdowns(); // Remettre à jour la sélection interne
            calculate();
        }

        amountEl_one.addEventListener('input', calculate);

        // Au chargement
        window.addEventListener('DOMContentLoaded', () => {
            initDropdowns();
            fetchRates();
        });
    </script>
</body>
</html>
